# fly.toml — Fly.io app config for companies-house-mcp.
#
# Generated by hand rather than via `fly launch` so the deployment is
# reproducible and version-controlled. Customise the `app` line before
# running `fly deploy` for the first time — the name must be globally
# unique across all of Fly.
#
# Usage:
#   1. fly apps create ch-mcp-ibex          # creates the app
#   2. fly secrets set COMPANIES_HOUSE_API_KEY=...
#   3. fly secrets set MCP_BEARER_TOKEN=...
#   4. fly deploy                             # builds + deploys

app = "ch-mcp-ibex"
primary_region = "lhr"   # London Heathrow — closest UK region

[build]
  dockerfile = "Dockerfile"

# HTTP service config — Fly's edge handles TLS and forwards plaintext
# HTTP to the internal port. The server inside the machine listens on
# 8080 (matches the --port arg in the Dockerfile CMD).
[http_service]
  internal_port = 8080
  force_https = true
  # Auto-stop when idle to keep cost down. Cold start adds ~1s on the
  # first request after a sleep. Flip to "off" + min_machines_running=1
  # if you'd rather pay a bit more for instant response.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Health check Fly uses to know whether the machine is healthy.
  # The server exposes GET /health returning {"status":"ok",...}.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Cheapest viable VM — plenty for a tools-only MCP server.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
